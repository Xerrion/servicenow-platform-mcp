name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below to help us investigate.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Configure the server with...
        2. Call the tool...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or tool output if available.
    validations:
      required: true
  - type: dropdown
    id: mcp-client
    attributes:
      label: MCP Client
      description: Which MCP client are you using?
      options:
        - Claude Desktop
        - VS Code Copilot
        - Cursor
        - OpenCode
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Server Version
      description: "Output of `pip show servicenow-platform-mcp` or check pyproject.toml"
      placeholder: "e.g., 0.9.0"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: "Output of `python --version`"
      placeholder: "e.g., 3.12.4"
    validations:
      required: true
  - type: dropdown
    id: servicenow-release
    attributes:
      label: ServiceNow Release
      description: Which ServiceNow release is your instance running?
      options:
        - Xanadu
        - Yokohama
        - Washington DC
        - Vancouver
        - Utah
        - Other / Unknown
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or log output
