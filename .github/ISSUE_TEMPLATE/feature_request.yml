name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for improving the server? We'd love to hear it!
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What workflow is missing or painful?
      placeholder: "I'm frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like this to work
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other solutions have you considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the server does this relate to?
      options:
        - Core (table, record, query)
        - Attachments
        - Change Intelligence
        - Debug & Trace
        - Investigations
        - Documentation Generation
        - Domain Tools (incident, change, problem, etc.)
        - CMDB
        - Service Catalog
        - Configuration / Settings
        - Safety & Policy
        - Other
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, or examples
